# penguin configuration
# Paid/OSINT API keys are read from ENVIRONMENT variables ONLY (never stored here).
# Every paid integration is DISABLED by default.

general:
  # SLIRP-SAFE PROFILE. The link drops came from VirtualBox's user-mode NAT
  # (SLIRP, gateway 10.0.2.2 / guest 10.0.2.15), NOT the physical router or the
  # proxy pool: a recon connection burst overruns SLIRP's tiny socket table and
  # takes the whole VM offline (proven: `From 10.0.2.15 ... Destination Host
  # Unreachable` mid-run). Bridged mode would skip SLIRP but is impossible on a
  # Wi-Fi / TUN-proxy host, so the four knobs below bound concurrency under
  # SLIRP's ceiling. Raise them back toward 50/300/1000/8 only off SLIRP
  # (wired bridge, VMware NAT, WSL2, or a VPS).
  threads: 15
  # HTTP request rate (aggregate; block2 splits it across the live-host fan-out).
  # TCP is heavier on SLIRP than UDP (sockets linger) -> keep it at/below
  # dns_rate_limit. 100 keeps concurrent TCP flows well under what collapsed
  # the SLIRP socket table.
  rate_limit: 100
  # DNS qps for puredns/dnsx. Unbounded massdns/dnsx opens ~10k concurrent UDP
  # flows that SLIRP cannot forward -> whole-VM link drop. ~150 keeps DNS
  # concurrency to tens of flows (rate*RTT), which SLIRP survives; a 100k-word
  # brute then takes ~11 min but full coverage is preserved by the size-scaled
  # timeout below. Raise well past this only off SLIRP.
  dns_rate_limit: 150
  # Ceiling (s) for one puredns/dnsx call. The wall is scaled to wordlist size /
  # dns_rate_limit so the whole list resolves instead of truncating at 1200s;
  # this just caps that scaling.
  dns_max_timeout: 5400
  timeout: 30
  resolvers_file: wordlists/resolvers.txt
  output_dir: results
  user_agent: "penguin-recon"
  wordlists_dir: wordlists
  retry_attempts: 2
  retry_backoff: 2.0
  # Concurrency for the independent, distinct-output fan-out points only
  # (block1 passive enum, permutation generators, block4 origin discovery,
  # block2 js/api/dir-fuzz/gau, block1 dnsx resolve). Overlaps network-bound
  # waits without CPU contention or losing results. Dominant SLIRP knob: 8
  # sources each opening a connection burst is what peaks the socket count past
  # SLIRP's table and drops the VM link, so 3 here. Set to 1 for fully
  # sequential; raise only off SLIRP.
  max_parallel_tools: 3
  # Cap on live hosts per block (dir-fuzz, API probes, open DB scan). None = unlimited.
  max_hosts_per_block: 50
  # Dedicated cap for block3 (open-DB/cloud masscan/nmap); own knob so an
  # explicit max_hosts_per_block is never silently overridden. None = unlimited.
  max_hosts_block3: 100
  # Dir-fuzz wordlist (issue #2): raft-medium-directories (~30k) by default
  # instead of directory-list-2.3-medium (~220k). Missing file -> fallback to
  # wordlists/directory-list-2.3-medium.txt.
  dirfuzz_wordlist: "wordlists/raft-medium-directories.txt"
  # feroxbuster duplicates ffuf's dir brute; off by default, flip on for a
  # second engine (issue #2).
  dirfuzz_feroxbuster: false
  # httpx -screenshot needs a real Chrome/Chromium binary (via go-rod) and
  # will try to auto-download one if missing, which can fail outright in
  # offline/sandboxed environments. Off by default; flip on if you want them.
  screenshots: false

stages:
  infra: true
  web: true
  cloud_db: true
  elite: true

# per-tool settings; set proxy:false to exclude a tool from proxy routing
tools:
  # subfinder proxy:false -- routing all 30+ passive sources through one free
  # SOCKS proxy is what crashed it (digitorus goroutine panic / 300s hangs) and
  # it queries aggregators, not the target, so direct is both safer and works.
  # The host already egresses through its TUN system proxy, so this doesn't
  # expose the operator IP any more than the un-proxied crt.sh/findomain do.
  subfinder: {proxy: false, threads: 15}
  httpx: {proxy: true, threads: 15}
  puredns: {proxy: true}
  dnsx: {proxy: true}
  amass: {proxy: true}
  ffuf: {proxy: true}
  katana: {proxy: true}
  gau: {proxy: true}
  nuclei: {proxy: true}
  # these have no CLI proxy flag of their own (see ToolContext.proxy_flag
  # mapping) -- proxy:false avoids burning a pick() from the rotation for a
  # proxy that would never be applied.
  linkfinder: {proxy: false}
  secretfinder: {proxy: false}
  jsluice: {proxy: false}
  gitdumper: {proxy: false}
  cloudflair: {proxy: false}
  trufflehog: {proxy: false}
  gitleaks: {proxy: false}
  github-subdomains: {proxy: false}
  dnsvalidator: {proxy: false}
  gotator: {proxy: false}
  hakrawler: {proxy: false}
  paramspider: {proxy: false}
  x8: {proxy: false}
  masscan: {proxy: false}
  redis-cli: {proxy: false}
  s3scanner: {proxy: false}
  bucketloot: {proxy: false}
  trivy: {proxy: false}
  grpcurl: {proxy: false}

proxies:
  enabled: true                       # fetch + validate + apply on EVERY run
  proxifly: "https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/all/data.txt"
  iplocate: "https://raw.githubusercontent.com/iplocate/free-proxy-list/main/protocols/socks5.txt"
  validate: true
  test_url: "http://example.com"
  timeout: 3
  validate_workers: 40                 # concurrent validation workers; sets the peak simultaneous-socket
                                       # burst, which SLIRP's small NAT table cannot absorb at 100. 40 stays
                                       # under SLIRP's ceiling; total volume is gated by max_candidates.
  max_candidates: 800                  # cap total attempts: each lingers ~120s in the router's conntrack
                                       # table, so validating thousands overflows it and drops the WAN
                                       # link right after validation. Raise for a bigger pool if the
                                       # router tolerates it; 0 = unbounded (old flooding behaviour).
  target_valid: 150                    # stop validating early once this many working proxies found; 0 = off
  cache_ttl_minutes: 60                # reuse validated pool within TTL; 0 disables cache (issue #3)
  protocol_preference: "http"         # http | socks5 | any
  rotate: "roundrobin"                # roundrobin | random | fastest
  pool_file: "results/proxies/proxies_valid.txt"

paid:
  shodan:        {enabled: false, api_key_env: "SHODAN_KEY"}
  censys:        {enabled: false, api_id_env: "CENSYS_ID", api_secret_env: "CENSYS_SECRET"}
  securitytrails: {enabled: false, api_key_env: "SECURITYTRAILS_KEY"}
  chaos:         {enabled: false, api_key_env: "CHAOS_KEY"}
  github:        {enabled: false, api_key_env: "GITHUB_TOKEN"}
  grayhat:       {enabled: false, api_key_env: "GRAYHAT_KEY"}
  netlas:        {enabled: false, api_key_env: "NETLAS_KEY"}
  fofa:          {enabled: false, api_key_env: "FOFA_KEY"}

notify:
  enabled: false
  provider: slack                    # slack | discord | telegram
  webhook_env: "PENGUIN_NOTIFY_WEBHOOK"
  notify_on: ["new_subdomains", "critical_findings"]

continuous:
  enabled: false
  interval: "6h"
